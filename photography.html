  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <span class="lightbox-nav lightbox-prev" onclick="navLightbox(event, -1)">&#10094;</span>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <span class="lightbox-nav lightbox-next" onclick="navLightbox(event, 1)">&#10095;</span>
  </div>

  <footer class="footer">
    <p>Website design adapted from <a href="https://rishubhpar.github.io">Rishubh Parihar</a>, originally inspired by <a href="https://jonbarron.info/">Jon Barron</a>.</p>
  </footer>

  <script>
    // Derive photo list from the gallery DOM (so the update_photography.py script only needs to rewrite the HTML block above).
    const photos = Array.from(document.querySelectorAll('#gallery .gallery-item img')).map(el => el.getAttribute('src'));
    let currentIdx = 0;

    function openLightbox(idx) {
      currentIdx = idx;
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = photos[idx];
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navLightbox(e, delta) {
      if (e) e.stopPropagation();
      currentIdx = (currentIdx + delta + photos.length) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentIdx];
    }

    // Close on background click (not on image/nav/close)
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', function(e) {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') navLightbox(null, -1);
      else if (e.key === 'ArrowRight') navLightbox(null, 1);
    });
  </script>
</body>
