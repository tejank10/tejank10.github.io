  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <span class="lightbox-nav lightbox-prev" onclick="navLightbox(event, -1)">&#10094;</span>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">

  </footer>

  <script>
    // Derive photo list and location metadata from the gallery DOM.
    const galleryItems = Array.from(document.querySelectorAll('#gallery .gallery-item'));
    const photos = galleryItems.map(el => el.querySelector('img').getAttribute('src'));
    const photoMeta = galleryItems.map(el => ({
      lat:      el.dataset.lat      || null,
      lng:      el.dataset.lng      || null,
      location: el.dataset.location || null,
    }));
    let currentIdx = 0;

    // --- Inject always-visible location labels for photos with GPS data ---
    const pinSvg =
      `<svg width="9" height="12" viewBox="0 0 10 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">` +
      `<path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 8 5 8s5-4.25 5-8c0-2.76-2.24-5-5-5zm0 6.75A1.75 1.75 0 1 1 5 3.25a1.75 1.75 0 0 1 0 3.5z" fill="currentColor"/>` +
      `</svg>`;

    galleryItems.forEach((item, i) => {
      const m = photoMeta[i];
      if (!m.location && !m.lat) return;
      const lat = m.lat, lng = m.lng;
      const label = m.location || `${parseFloat(lat).toFixed(4)}, ${parseFloat(lng).toFixed(4)}`;
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
      const overlay = document.createElement('div');
      overlay.className = 'gallery-overlay';
      overlay.innerHTML =
        `<a href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">` +
        pinSvg + label + `</a>`;
      item.appendChild(overlay);
    });

    // --- Lightbox ---
    function _updateCaption(idx) {
      const m = photoMeta[idx];
      const caption = document.getElementById('lightbox-caption');
      if (m.location || m.lat) {
        const lat = m.lat, lng = m.lng;
        const label = m.location || `${parseFloat(lat).toFixed(4)}, ${parseFloat(lng).toFixed(4)}`;
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
        caption.innerHTML =
          `<a href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">` +
          pinSvg + ` ${label}</a>`;
        caption.style.display = '';
      } else {
        caption.innerHTML = '';
        caption.style.display = 'none';
      }
    }

    function openLightbox(idx) {
      currentIdx = idx;
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = photos[idx];
      _updateCaption(idx);
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navLightbox(e, delta) {
      if (e) e.stopPropagation();
      currentIdx = (currentIdx + delta + photos.length) % photos.length;
      document.getElementById('lightbox-img').src = photos[currentIdx];
      _updateCaption(currentIdx);
    }

    // Close on background click
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', function(e) {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') navLightbox(null, -1);
      else if (e.key === 'ArrowRight') navLightbox(null, 1);
    });
  </script>
